name: 거시지표 수집

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '수집 시작일 (예: 2019-10-01)'
        required: true
        default: '2019-10-01'
      end_date:
        description: '수집 종료일 (예: 2026-05-31)'
        required: true
        default: '2026-05-31'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: 의존성 설치
        run: pip install -r data-pipeline/requirements.txt

      - name: DB 마이그레이션 (V4 - 신규 컬럼)
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, sys
          sys.path.insert(0, '.')
          from db.connection import get_connection
          sql = open('../schema/V4__add_market_indicators.sql').read()
          with get_connection() as conn:
              with conn.cursor() as cur:
                  cur.execute(sql)
          print('마이그레이션 완료')
          PYEOF

      - name: 거시지표 수집
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -c "
          from collectors.macro_collector import collect
          collect('${{ inputs.start_date }}', '${{ inputs.end_date }}')
          print('거시지표 수집 완료')
          "

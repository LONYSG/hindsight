name: Oracle ARM 인스턴스 생성

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: OCI CLI 설치
        run: pip install oci-cli

      - name: OCI CLI 설정
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << 'EOF'
          [DEFAULT]
          user=ocid1.user.oc1..aaaaaaaay442ktjd35xlnnbsbottvw723mnfapv3hlvk2aivbtc4yoqtd37a
          fingerprint=4d:0c:6a:9d:73:65:f1:7b:34:4d:71:9d:21:ed:1c:56
          tenancy=ocid1.tenancy.oc1..aaaaaaaadrdhymala26cqiimwt5srdjey7bmqdn6t76ljgv6oqt5c6lyfbsq
          region=ap-chuncheon-1
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          # SSH 공개키 저장
          cat > /tmp/hindsight_rsa.pub << 'EOF'
          ssh-rsa  lonysg@NT750XGR-A31A
          EOF

      - name: ARM 인스턴스 생성 재시도 (최대 5시간 50분)
        run: |
          TENANCY="ocid1.tenancy.oc1..aaaaaaaadrdhymala26cqiimwt5srdjey7bmqdn6t76ljgv6oqt5c6lyfbsq"
          SUBNET="ocid1.subnet.oc1.ap-chuncheon-1.aaaaaaaaydam2iglrharrtsnvtsnzqijxqc24h3ijwydvabahrezk4emrjiq"
          IMAGE="ocid1.image.oc1.ap-chuncheon-1.aaaaaaaan3ml5enlvv4uonyln7ppzfhs7msfzjbwl54gomazoezivbl36twa"
          SHAPE="VM.Standard.A1.Flex"

          ATTEMPT=0
          while true; do
            ATTEMPT=$((ATTEMPT + 1))
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
            echo "[$TIMESTAMP] 시도 #$ATTEMPT..."

            RESULT=$(oci compute instance launch \
              --compartment-id "$TENANCY" \
              --availability-domain "eLCr:AP-CHUNCHEON-1-AD-1" \
              --shape "$SHAPE" \
              --shape-config '{"ocpus": 2, "memoryInGBs": 12}' \
              --image-id "$IMAGE" \
              --subnet-id "$SUBNET" \
              --assign-public-ip true \
              --display-name "hindsight-server" \
              --ssh-authorized-keys-file /tmp/hindsight_rsa.pub \
              2>&1) || true

            CLEAN=$(echo "$RESULT" | grep -v FutureWarning | grep -v "warnings\." | grep -v strict)
            CODE=$(echo "$CLEAN" | python3 -c "import json,sys,re; s=sys.stdin.read(); m=re.search(r'\"code\":\s*\"([^\"]+)\"',s); print(m.group(1) if m else '')" 2>/dev/null)
            MSG=$(echo "$CLEAN" | python3 -c "import json,sys,re; s=sys.stdin.read(); m=re.search(r'\"message\":\s*\"([^\"]+)\"',s); print(m.group(1) if m else '')" 2>/dev/null)

            if echo "$CLEAN" | grep -q '"lifecycle-state"'; then
              echo ""
              echo "✅ 성공! 인스턴스 생성됨"
              PUBLIC_IP=$(echo "$CLEAN" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('data',{}).get('public-ip','확인 필요'))" 2>/dev/null || echo "OCI 콘솔에서 확인")
              echo "Public IP: $PUBLIC_IP"
              echo "SSH 접속: ssh -i ~/.oci/hindsight_rsa opc@$PUBLIC_IP"
              exit 0
            elif [ "$CODE" = "InternalError" ] || echo "$MSG" | grep -qi "capacity"; then
              echo "  → 용량 부족 (code=$CODE) — 5분 후 재시도"
              sleep 300
            elif echo "$CLEAN" | grep -q "RequestException\|timed out\|Timeout"; then
              echo "  → 타임아웃 — 1분 후 재시도"
              sleep 60
            else
              echo "  → 기타 오류 (code=$CODE): $MSG — 2분 후 재시도"
              sleep 120
            fi
          done

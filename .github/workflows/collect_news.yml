name: 뉴스 수집

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '수집 시작일 (예: 2020-03-01)'
        required: true
        default: '2020-03-01'
      end_date:
        description: '수집 종료일 (예: 2020-03-31)'
        required: true
        default: '2020-03-31'
      summarize:
        description: 'Gemini 요약 실행 여부 (true/false)'
        required: true
        default: 'false'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: 의존성 설치
        run: pip install -r data-pipeline/requirements.txt

      - name: 글로벌 뉴스 수집 (Guardian)
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -c "
          from collectors.news_collector import collect
          collect('${{ inputs.start_date }}', '${{ inputs.end_date }}', summarize=False)
          print('Guardian 수집 완료')
          "

      - name: 기업 뉴스 수집 (Alpha Vantage)
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -c "
          from collectors.company_news_collector import collect
          collect(start_date='${{ inputs.start_date }}', end_date='${{ inputs.end_date }}')
          print('Alpha Vantage 수집 완료')
          "

      - name: Gemini 요약 실행
        if: ${{ inputs.summarize == 'true' }}
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -c "
          from collectors.news_collector import re_summarize_all
          re_summarize_all()
          print('Gemini 요약 완료')
          "

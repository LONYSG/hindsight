name: 뉴스 수집 + 요약

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '수집 시작일 (예: 2020-03-01)'
        required: true
        default: '2020-03-01'
      end_date:
        description: '수집 종료일 (예: 2020-03-31)'
        required: true
        default: '2020-03-31'
  schedule:
    - cron: '5 0 * * *'  # KST 09:05

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: 의존성 설치
        run: pip install -r data-pipeline/requirements.txt

      - name: 날짜 설정
        id: dates
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            NEXT_MONTH=$(python3 -c "import json; d=json.load(open('data-pipeline/collection_state.json')); print(d['next_month'])")
            END_MONTH=$(python3 -c "import json; d=json.load(open('data-pipeline/collection_state.json')); print(d['end_month'])")

            if [[ "$NEXT_MONTH" > "$END_MONTH" ]]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "전체 수집 완료. (next=$NEXT_MONTH > end=$END_MONTH)"
              exit 0
            fi

            # 1달치 범위 계산
            START_DATE="${NEXT_MONTH}-01"
            END_DATE=$(python3 -c "import calendar; y,m=map(int,'$NEXT_MONTH'.split('-')); print(f'{y:04d}-{m:02d}-{calendar.monthrange(y,m)[1]:02d}')")
            echo "start_date=${START_DATE}" >> $GITHUB_OUTPUT
            echo "end_date=${END_DATE}" >> $GITHUB_OUTPUT
            echo "target_month=${NEXT_MONTH}" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "[스케줄] ${START_DATE} ~ ${END_DATE} 수집 + 요약 시작"
          else
            # 수동 실행: start_date 기준 월 계산
            TARGET_MONTH=$(python3 -c "print('${{ inputs.start_date }}'[:7])")
            echo "start_date=${{ inputs.start_date }}" >> $GITHUB_OUTPUT
            echo "end_date=${{ inputs.end_date }}" >> $GITHUB_OUTPUT
            echo "target_month=${TARGET_MONTH}" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 글로벌 뉴스 수집 (Guardian)
        id: guardian
        if: steps.dates.outputs.skip != 'true'
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -c "
          from collectors.news_collector import collect
          collect('${{ steps.dates.outputs.start_date }}', '${{ steps.dates.outputs.end_date }}', summarize=False)
          print('Guardian 수집 완료')
          "

      - name: 기업 뉴스 수집 (Alpha Vantage)
        id: alphavantage
        if: steps.dates.outputs.skip != 'true'
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -c "
          from collectors.company_news_collector import collect
          collect(start_date='${{ steps.dates.outputs.start_date }}', end_date='${{ steps.dates.outputs.end_date }}')
          print('Alpha Vantage 수집 완료')
          "

      - name: Gemini 요약 (해당 월)
        id: summarize
        if: steps.dates.outputs.skip != 'true'
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -c "
          from collectors.news_collector import re_summarize_all
          re_summarize_all(
              date_from='${{ steps.dates.outputs.start_date }}',
              date_to='${{ steps.dates.outputs.end_date }}',
          )
          print('Gemini 요약 완료')
          "

      - name: 상태 업데이트 및 커밋 (스케줄 실행 시)
        id: state_update
        if: github.event_name == 'schedule' && steps.dates.outputs.skip != 'true'
        run: |
          python3 -c "
          import json
          s = json.load(open('data-pipeline/collection_state.json'))
          y, m = map(int, '${{ steps.dates.outputs.target_month }}'.split('-'))
          m += 1
          if m > 12:
              y, m = y + 1, 1
          s['next_month'] = f'{y:04d}-{m:02d}'
          json.dump(s, open('data-pipeline/collection_state.json', 'w'), indent=2)
          print('다음 수집:', s['next_month'])
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-pipeline/collection_state.json
          git commit -m "chore: 뉴스 수집+요약 완료 (${{ steps.dates.outputs.target_month }}) [skip ci]"
          git push

      - name: 완료 알림 (ntfy)
        if: steps.dates.outputs.skip != 'true' && success()
        run: |
          MONTH="${{ steps.dates.outputs.target_month }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s \
            -H "Title: ✅ ${MONTH} 수집+요약 완료" \
            -H "Tags: white_check_mark,newspaper" \
            -H "Priority: default" \
            -H "Click: ${RUN_URL}" \
            -d "${MONTH} Guardian + Alpha Vantage 수집, Gemini 요약 완료" \
            https://ntfy.sh/hindsight_lonysg

      - name: 실패 알림 (ntfy)
        if: steps.dates.outputs.skip != 'true' && failure()
        run: |
          MONTH="${{ steps.dates.outputs.target_month }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # 실패한 스텝 목록 구성
          FAILED=""
          if [ "${{ steps.guardian.outcome }}" = "failure" ]; then
            FAILED="${FAILED}• [Guardian 수집] API 한도 초과 or 네트워크 오류\n"
          fi
          if [ "${{ steps.alphavantage.outcome }}" = "failure" ]; then
            FAILED="${FAILED}• [Alpha Vantage] API 한도(25req/day) 초과 or 오류\n"
          fi
          if [ "${{ steps.summarize.outcome }}" = "failure" ]; then
            FAILED="${FAILED}• [Gemini 요약] API 한도(1500req/day) 초과 or 모델 오류\n"
          fi
          if [ "${{ steps.state_update.outcome }}" = "failure" ]; then
            FAILED="${FAILED}• [상태 업데이트] git push 실패 (충돌 or 권한 오류)\n"
          fi
          # 어느 스텝인지 특정 안 된 경우
          if [ -z "$FAILED" ]; then
            FAILED="• 알 수 없는 오류 (로그 확인 필요)\n"
          fi

          curl -s \
            -H "Title: ❌ ${MONTH} 수집 실패" \
            -H "Tags: x,newspaper" \
            -H "Priority: high" \
            -H "Click: ${RUN_URL}" \
            -d "$(printf "${FAILED}\n로그: ${RUN_URL}")" \
            https://ntfy.sh/hindsight_lonysg

name: ETF 가격 수집

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '수집 시작일'
        required: true
        default: '2019-10-01'
      end_date:
        description: '수집 종료일'
        required: true
        default: '2026-05-21'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: 의존성 설치
        run: pip install -r data-pipeline/requirements.txt

      - name: ETF 가격 수집
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -c "
          from collectors.price_collector import collect
          tickers = ['SOXX', 'XLK', 'XLE', 'XLF', 'XLV', 'XLI', 'XLY']
          for t in tickers:
              collect(t, '${{ inputs.start_date }}', '${{ inputs.end_date }}')
          print('ETF 수집 완료')
          "

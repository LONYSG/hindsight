name: 뉴스 요약 (Gemini)

on:
  workflow_dispatch:
    inputs:
      max_count:
        description: '최대 처리 건수 (0=전체)'
        required: true
        default: '1400'
  schedule:
    - cron: '5 16 * * *'  # KST 01:05 (UTC 16:05 전날)

permissions:
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: 의존성 설치
        run: pip install -r data-pipeline/requirements.txt

      - name: Gemini 요약 실행
        working-directory: data-pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          MAX_COUNT=${{ github.event_name == 'schedule' && '1400' || inputs.max_count }}
          python -c "
          from collectors.news_collector import re_summarize_all
          re_summarize_all(max_count=${MAX_COUNT})
          print('요약 완료')
          "

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:postgres}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/hindsight}
    username: ${DATABASE_USERNAME:hindsight}
    password: ${DATABASE_PASSWORD:hindsight}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:hindsight-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration-ms: 2592000000

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/auth/kakao/callback}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.hindsight: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN

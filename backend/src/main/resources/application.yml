spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:postgres}

  datasource:
    url: jdbc:postgresql://localhost:5433/hindsight
    username: hindsight
    password: hindsight
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway가 스키마 관리 → JPA는 검증만
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    user:
      name: admin                 # 개발 중 임시 (나중에 제거)
      password: admin

server:
  port: 8080

jwt:
  secret: hindsight-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration-ms: 2592000000        # 30일

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: http://localhost:5173/auth/kakao/callback

elasticsearch:
  host: localhost
  port: 9200
  index: hindsight-news

logging:
  level:
    com.hindsight: DEBUG
    org.springframework.security: INFO
